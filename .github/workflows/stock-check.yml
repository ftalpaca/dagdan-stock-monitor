name: Dagdan Stock Monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🔴 TEST STEP (temporary - confirms Discord works)
      - name: Test Discord webhook
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content":"TEST MESSAGE FROM GITHUB ACTIONS"}' \
          https://discord.com/api/webhooks/1522403734993502229/zmtCvR0yzs1mYTkD4d_1BVNFjbp01V_29jnxtOLG5PIIFqZpQaEweznWwZPbzpQP845Q

      - name: Run checker
        run: python main.py
